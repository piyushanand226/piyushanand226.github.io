name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      contents: write   # allow pushing to gh-pages
      pages: write      # allow publishing to Pages
      id-token: write   # required for OIDC authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # ✅ updated to v4

      # Upload artifact for Pages (latest version)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3   # ✅ updated to v3
        with:
          path: ./   # Root folder containing index.html

      # Deploy to GitHub Pages (latest version)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4   # ✅ updated to v4
